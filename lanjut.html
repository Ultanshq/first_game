<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ocean Whacker | Briefing</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Poppins:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00d2ff;
            --secondary: #3a7bd5;
            --accent: #fbc531;
            --white: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: linear-gradient(180deg, #74b9ff 0%, #3a7bd5 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Poppins', sans-serif;
            padding: 20px;
            overflow: hidden; /* Mencegah scroll karena ada ombak */
            position: relative;
        }

        /* ANIMASI OMBAK */
        .waves {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 15vh;
            min-height: 100px;
            max-height: 150px;
            z-index: 1;
        }

        .parallax > use {
            animation: move-forever 25s cubic-bezier(.55,.5,.45,.5) infinite;
        }
        .parallax > use:nth-child(1) { animation-delay: -2s; animation-duration: 7s; }
        .parallax > use:nth-child(2) { animation-delay: -3s; animation-duration: 10s; }
        .parallax > use:nth-child(3) { animation-delay: -4s; animation-duration: 13s; }
        .parallax > use:nth-child(4) { animation-delay: -5s; animation-duration: 20s; }

        @keyframes move-forever {
            0% { transform: translate3d(-90px,0,0); }
            100% { transform: translate3d(85px,0,0); }
        }

        .container {
            width: 100%;
            max-width: 420px;
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.4);
            padding: 40px 25px;
            text-align: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.15);
            color: var(--white);
            z-index: 10; /* Di atas ombak */
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.8rem;
            letter-spacing: 2px;
            margin-bottom: 5px;
            text-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .subtitle {
            font-size: 0.75rem;
            opacity: 0.8;
            margin-bottom: 25px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .high-score-box {
            margin-bottom: 25px;
            padding: 15px;
            background: rgba(255,255,255,0.15);
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .hs-label { font-size: 0.7rem; letter-spacing: 3px; font-weight: 700; margin-bottom: 5px; color: rgba(255,255,255,0.9); }
        .hs-value { 
            font-family: 'Orbitron', sans-serif; 
            font-size: 3.5rem; 
            color: var(--accent);
            line-height: 1;
        }

        .info-card {
            background: rgba(0, 0, 0, 0.1);
            border-radius: 20px;
            padding: 20px;
            text-align: left;
            margin-bottom: 30px;
        }

        .info-item {
            display: flex;
            align-items: center;
            margin-bottom: 15px;
            font-size: 0.85rem;
        }
        .info-item:last-child { margin-bottom: 0; }

        .icon {
            width: 32px; height: 32px;
            background: var(--white);
            border-radius: 10px;
            display: flex; justify-content: center; align-items: center;
            margin-right: 15px; font-size: 1rem;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }

        .btn-start {
            background: var(--white);
            color: var(--secondary);
            border: none;
            width: 100%;
            padding: 18px;
            border-radius: 20px;
            font-family: 'Poppins', sans-serif;
            font-weight: 800;
            font-size: 1.1rem;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        .btn-start:hover { transform: translateY(-3px); box-shadow: 0 15px 25px rgba(0,0,0,0.2); }
        .btn-start:active { transform: scale(0.98); }

        .footer-text { margin-top: 25px; font-size: 0.7rem; opacity: 0.6; }
    </style>
</head>
<body>

    <div class="container">
        <h1>OCEAN MISSION</h1>
        <p class="subtitle">WIBU GAMES • Security Protocol</p>

        <div class="high-score-box">
            <p class="hs-label">REKOR TERTINGGI</p>
            <p class="hs-value" id="hs-display">0</p>
        </div>

        <div class="info-card">
            <div class="info-item">
                <div class="icon">❤️</div>
                <p>Kamu punya <b>5 Nyawa</b>. Jangan biarkan target kabur!</p>
            </div>
            <div class="info-item">
                <div class="icon">🎨</div>
                <p>Warna berubah setiap <b>5 Poin</b>. Level up!</p>
            </div>
            <div class="info-item">
                <div class="icon">⚡</div>
                <p>Kecepatan meningkat seiring naiknya skor.</p>
            </div>
        </div>

        <button class="btn-start" onclick="goToGame()">MULAI OPERASI</button>
        <p class="footer-text">WIBU GAMES - Sultan Iskhaq R</p>
    </div>

    <svg class="waves" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
    viewBox="0 24 150 28" preserveAspectRatio="none" shape-rendering="auto">
        <defs>
            <path id="gentle-wave" d="M-160 44c30 0 58-18 88-18s 58 18 88 18 58-18 88-18 58 18 88 18 v44h-352z" />
        </defs>
        <g class="parallax">
            <use xlink:href="#gentle-wave" x="48" y="0" fill="rgba(255,255,255,0.7" />
            <use xlink:href="#gentle-wave" x="48" y="3" fill="rgba(255,255,255,0.5)" />
            <use xlink:href="#gentle-wave" x="48" y="5" fill="rgba(255,255,255,0.3)" />
            <use xlink:href="#gentle-wave" x="48" y="7" fill="#fff" />
        </g>
    </svg>

    <script>
        // SINKRONISASI SKOR
        window.onload = () => {
            // Kita ambil 'sultan_score_master' agar SAMA dengan game.html
            const savedScore = localStorage.getItem('sultan_score_master') || 0;
            document.getElementById('hs-display').innerText = savedScore;
        };

        function goToGame() {
            document.querySelector('.container').style.transition = "0.5s";
            document.querySelector('.container').style.opacity = "0";
            document.querySelector('.container').style.transform = "translateY(-20px)";
            setTimeout(() => { window.location.href = 'game.html'; }, 500);
        }
    </script>
</body>
</html>
