<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WIBU GAMES | Ocean Whacker</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-main: #81ecec;
            --soft-white: rgba(255, 255, 255, 0.9);
        }

        /* TEMA WARNA SOFT */
        body.vibe-1 { --bg-main: #81ecec; }
        body.vibe-2 { --bg-main: #fab1a0; }
        body.vibe-3 { --bg-main: #74b9ff; }
        body.vibe-4 { --bg-main: #ffeaa7; }
        body.vibe-5 { --bg-main: #ff7675; }
        body.vibe-6 { --bg-main: #2d3436; }
        body.vibe-7 { --bg-main: #000000; }

        * { margin: 0; padding: 0; box-sizing: border-box; touch-action: manipulation; }

        body {
            background-color: var(--bg-main);
            height: 100vh; width: 100vw;
            display: flex; flex-direction: column; align-items: center;
            font-family: 'Poppins', sans-serif; color: #2d3436;
            transition: background 0.8s ease; overflow: hidden;
        }

        /* TOP BAR */
        .top-nav {
            width: 100%; padding: 20px;
            display: flex; justify-content: space-between; align-items: center;
            z-index: 100;
        }
        .best-box {
            background: var(--soft-white); padding: 5px 15px;
            border-radius: 20px; font-size: 0.8rem; font-weight: 600;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .home-circle {
            width: 40px; height: 40px; background: var(--soft-white);
            border-radius: 50%; display: flex; justify-content: center; align-items: center;
            text-decoration: none; font-size: 1.2rem; box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        /* SCORE MAIN */
        .main-score-container {
            text-align: center; margin-top: 10px; z-index: 10;
        }
        #score-val { font-size: 5rem; font-weight: 800; color: white; line-height: 1; text-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        #lives-display { font-size: 1.2rem; margin-top: 5px; letter-spacing: 3px; }

        /* GRID SYSTEM */
        .grid {
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px;
            width: 90%; max-width: 400px; margin-top: 30px; z-index: 5;
        }
        .hole { 
            aspect-ratio: 1/1; background: rgba(255, 255, 255, 0.2); 
            border-radius: 24px; position: relative; overflow: hidden;
            border: 2px solid rgba(255,255,255,0.3);
        }

        .emoji-target {
            position: absolute; width: 100%; height: 100%;
            display: flex; justify-content: center; align-items: center;
            font-size: 3.5rem; top: 100%; cursor: pointer;
            transition: top 0.15s cubic-bezier(0.18, 0.89, 0.32, 1.28);
            user-select: none;
        }
        .emoji-target.up { top: 0; }

        /* ANIMATIONS */
        @keyframes shake {
            0%, 100% { transform: translate(0, 0); }
            20% { transform: translate(-8px, 0); }
            40% { transform: translate(8px, 0); }
            60% { transform: translate(-8px, 0); }
            80% { transform: translate(8px, 0); }
        }
        .hit-particle {
            position: fixed; pointer-events: none; z-index: 200; font-size: 2rem;
            animation: popOut 0.6s ease-out forwards;
        }
        @keyframes popOut {
            0% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
            100% { transform: translate(var(--tx), var(--ty)) scale(0) rotate(180deg); opacity: 0; }
        }

        /* GAME OVER */
        #game-over {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.95); display: none; flex-direction: column;
            justify-content: center; align-items: center; z-index: 1000; backdrop-filter: blur(10px);
        }
        .go-title { font-size: 1.5rem; font-weight: 800; color: #2d3436; margin-bottom: 20px; }
        .action-btn {
            width: 200px; padding: 15px; margin: 5px; border: none; border-radius: 15px;
            font-family: 'Poppins'; font-weight: 600; cursor: pointer; transition: 0.2s;
        }
        .retry-btn { background: #6c5ce7; color: white; }
        .exit-btn { background: #dfe6e9; color: #2d3436; }
    </style>
</head>
<body id="main-body">

    <div class="top-nav">
        <a href="lanjut.html" class="home-circle">🏠</a>
        <div class="best-box">BEST: <span id="high-score">0</span></div>
    </div>

    <div class="main-score-container">
        <div id="score-val">0</div>
        <div id="lives-display">❤️❤️❤️❤️❤️</div>
    </div>

    <div class="grid" id="game-grid">
        <div class="hole"><div class="emoji-target" onclick="bonk(this)">🐱</div></div>
        <div class="hole"><div class="emoji-target" onclick="bonk(this)">🐱</div></div>
        <div class="hole"><div class="emoji-target" onclick="bonk(this)">🐱</div></div>
        <div class="hole"><div class="emoji-target" onclick="bonk(this)">🐱</div></div>
        <div class="hole"><div class="emoji-target" onclick="bonk(this)">🐱</div></div>
        <div class="hole"><div class="emoji-target" onclick="bonk(this)">🐱</div></div>
        <div class="hole"><div class="emoji-target" onclick="bonk(this)">🐱</div></div>
        <div class="hole"><div class="emoji-target" onclick="bonk(this)">🐱</div></div>
        <div class="hole"><div class="emoji-target" onclick="bonk(this)">🐱</div></div>
    </div>

    <div id="game-over">
        <div class="go-title">PERMAINAN SELESAI</div>
        <div style="font-size: 4rem; font-weight: 800; margin-bottom: 30px;" id="final-score">0</div>
        <button class="action-btn retry-btn" onclick="location.reload()">MAIN LAGI</button>
        <button class="action-btn exit-btn" onclick="window.location.href='lanjut.html'">KEMBALI</button>
    </div>

    <script>
        let score = 0; let lives = 5; let gameActive = true;
        let lastHole; let baseSpeed = 1000;
        
        // KUNCI HARUS SAMA DENGAN lanjut.html
        const SCORE_KEY = 'sultan_score_master';
        
        let highScore = localStorage.getItem(SCORE_KEY) || 0;
        document.getElementById('high-score').innerText = highScore;

        const emojiSets = {
            v1: ['🐱', '🐰'], v2: ['🌸', '🦄'], v3: ['🐬', '🐠'],
            v4: ['🐥', '⭐'], v5: ['🍎', '🍓'], v6: ['🐋', '🐙'], v7: ['👽', '👾']
        };

        function updateVibes() {
            const b = document.getElementById('main-body');
            b.className = ''; 
            let set = emojiSets.v1;

            if (score > 50) { b.classList.add('vibe-7'); set = emojiSets.v7; }
            else if (score > 30) { b.classList.add('vibe-6'); set = emojiSets.v6; }
            else if (score > 20) { b.classList.add('vibe-5'); set = emojiSets.v5; }
            else if (score > 15) { b.classList.add('vibe-4'); set = emojiSets.v4; }
            else if (score > 10) { b.classList.add('vibe-3'); set = emojiSets.v3; }
            else if (score > 5) { b.classList.add('vibe-2'); set = emojiSets.v2; }
            else { b.classList.add('vibe-1'); }

            document.querySelectorAll('.emoji-target').forEach(e => {
                if(!e.classList.contains('up')) e.innerText = set[Math.floor(Math.random()*set.length)];
            });
        }

        function peep() {
            if (!gameActive) return;
            const holes = document.querySelectorAll('.hole');
            const hole = holes[Math.floor(Math.random() * holes.length)];
            if (hole === lastHole) return peep();
            lastHole = hole;

            const target = hole.querySelector('.emoji-target');
            target.classList.add('up');

            let speed = baseSpeed;
            if (score > 30) speed = Math.max(450, baseSpeed - ((score - 30) * 15));

            const timer = setTimeout(() => {
                if (target.classList.contains('up')) {
                    target.classList.remove('up');
                    loseLife();
                }
                if (gameActive) setTimeout(peep, speed * 0.8);
            }, speed);

            target.dataset.timer = timer;
        }

        function bonk(el) {
            if (!el.classList.contains('up') || !gameActive) return;
            clearTimeout(el.dataset.timer);
            
            score++;
            el.classList.remove('up');
            createParticles(el, el.innerText);
            
            document.getElementById('score-val').innerText = score;
            updateVibes();
            if (gameActive) setTimeout(peep, 100);
        }

        function createParticles(el, char) {
            const rect = el.getBoundingClientRect();
            for(let i=0; i<5; i++) {
                const p = document.createElement('div');
                p.className = 'hit-particle';
                p.innerText = char;
                p.style.left = (rect.left + rect.width/2) + 'px';
                p.style.top = (rect.top + rect.height/2) + 'px';
                const angle = Math.random() * Math.PI * 2;
                const dist = 80 + Math.random() * 50;
                p.style.setProperty('--tx', Math.cos(angle)*dist + 'px');
                p.style.setProperty('--ty', Math.sin(angle)*dist + 'px');
                document.body.appendChild(p);
                setTimeout(() => p.remove(), 600);
            }
        }

        function loseLife() {
            lives--;
            if (navigator.vibrate) navigator.vibrate([100, 50, 100]);
            document.body.style.animation = "shake 0.4s";
            setTimeout(() => document.body.style.animation = "", 400);

            const cry = document.createElement('div');
            cry.innerText = '😭';
            cry.style.position = 'fixed';
            cry.style.left = '50%'; cry.style.top = '50%';
            cry.style.fontSize = '4rem'; cry.style.zIndex = '500';
            cry.style.pointerEvents = 'none';
            document.body.appendChild(cry);
            setTimeout(() => cry.remove(), 500);

            document.getElementById('lives-display').innerText = '❤️'.repeat(lives);
            if (lives <= 0) endGame();
        }

        function endGame() {
            gameActive = false;
            // CEK DAN SIMPAN HIGH SCORE KE KUNCI YANG BENAR
            if (score > parseInt(highScore)) {
                localStorage.setItem(SCORE_KEY, score);
                document.getElementById('high-score').innerText = score;
            }
            document.getElementById('final-score').innerText = score;
            document.getElementById('game-over').style.display = 'flex';
        }

        window.onload = () => { updateVibes(); setTimeout(peep, 1000); };
    </script>
</body>
</html>
